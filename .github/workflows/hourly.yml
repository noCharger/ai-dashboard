name: Hourly Data Update

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run hourly scrapers
        env:
          AA_API_KEY: ${{ secrets.AA_API_KEY }}
        run: python scripts/fetch_all.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dashboard.json
          if git diff --staged --quiet; then
            echo "No dashboard data changes. Skip commit/push."
          else
            git commit -m "chore: update dashboard data (hourly)"
            git push
          fi
