name: Daily Benchmark Update

on:
  schedule:
    - cron: '0 6 * * *'  # Every day at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run all scrapers (including benchmarks)
        env:
          AA_API_KEY: ${{ secrets.AA_API_KEY }}
        run: python scripts/fetch_all.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dashboard.json
          git diff --staged --quiet || git commit -m "chore: update dashboard data (daily)"
          git push
